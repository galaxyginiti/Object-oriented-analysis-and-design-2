    code:`public final class Money {
    private final int amount;     // в копейках
    private final String currency;

    public Money(int amount, String currency) {
        this.amount = amount;
        this.currency = currency;
    }

    public Money add(Money other) {
        if (!currency.equals(other.currency))
            throw new IllegalArgumentException("Разные валюты");
        return new Money(amount + other.amount, currency);
    }

    @Override
    public boolean equals(Object o) {
        if (!(o instanceof Money)) return false;
        Money m = (Money) o;
        return amount == m.amount
            && currency.equals(m.currency);
    }

    @Override
    public int hashCode() {
        return Objects.hash(amount, currency);
    }
}

    code:`class IdentityMap {
    private Map<Long, Object> map = new HashMap<>();

    public void put(Long id, Object obj) {
        map.put(id, obj);
    }

    public Object get(Long id) {
        return map.get(id);
    }
}

class PersonMapper {
    private IdentityMap identityMap = new IdentityMap();

    public Person findById(Long id) {
        // сначала проверяем реестр
        Person cached = (Person) identityMap.get(id);
        if (cached != null) return cached;

        // только если нет — идём в БД
        Person person = loadFromDatabase(id);
        identityMap.put(id, person);
        return person;
    }
}

    code:`// 1. Инициализация по требованию (самый простой вариант)

const nav = document.getElementById('nav');
const content = document.getElementById('content');
let active = patterns[0].id;

function render(p) {
  return `<div class="card visible" id="card-${p.id}">
    <span class="tag ${p.tagClass}">${p.tag}</span>
    <h2>${p.name} <span style="font-weight:400;color:var(--color-text-secondary);font-size:16px">(${p.en})</span></h2>
    <p class="subtitle">${p.subtitle}</p>

    <div class="section-title">Проблема</div>
    <p>${p.problem}</p>

    <div class="section-title">Решение</div>
    <p>${p.solution}</p>

    <div class="section-title">Когда применять</div>
    <div class="when">${p.when}</div>

    <div class="section-title">Пример кода</div>
    <pre><code>${p.code}</code></pre>

    <hr class="divider">
    <div class="section-title">Связанные паттерны</div>
    <div class="related">${p.related.map(r=>`<span class="pill">${r}</span>`).join('')}</div>
  </div>`;
}

nav.innerHTML = patterns.map(p =>
  `<button data-id="${p.id}">${p.name} (${p.en})</button>`
).join('');

content.innerHTML = patterns.map(render).join('');

function show(id) {
  active = id;
  document.querySelectorAll('.card').forEach(c => c.classList.remove('visible'));
  document.getElementById('card-'+id).classList.add('visible');
  document.querySelectorAll('.nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.id === id);
  });
}

nav.querySelectorAll('button').forEach(b => {
  b.addEventListener('click', () => show(b.dataset.id));
});

show(patterns[0].id);
